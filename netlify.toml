# Netlify deployment config for AVYN Commerce.
#
# Deploy:
#   1. netlify init (or connect via the Netlify dashboard)
#   2. Set env vars (see NETLIFY.md for the full list, including ADMIN_TOKEN, ANTHROPIC_API_KEY, etc.)
#   3. Push to your connected branch — Netlify auto-builds with @netlify/plugin-nextjs.
#
# Cron is implemented as Netlify Scheduled Functions (netlify/functions/cron-*.mjs)
# that internally call our /api/cron/* endpoints. Schedules below are mirrored from
# vercel.json (kept as-is for reference but ignored by Netlify).

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Don't fail the build on lint/type warnings — we ran tsc clean locally
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_FLAGS = "--legacy-peer-deps"

# The official Next.js plugin handles App Router routes, API routes, middleware,
# and edge functions. Required.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Use esbuild for faster cold starts on Netlify Functions
[functions]
  node_bundler = "esbuild"

# ─── Function-level overrides ─────────────────────────────────────────────
# IMPORTANT: Heavy AI routes (pipeline, agents/*) easily exceed the default
# 10-second timeout when ANTHROPIC_API_KEY is set and real Claude calls fire.
# Netlify timeout MUST be configured per-function in the dashboard:
#   Site → Functions → <function-name> → Settings → Function timeout
# Free tier max = 10s, Pro = 26s, Enterprise = configurable.
# When the timeout fires, Netlify returns an HTML error page that breaks
# JSON.parse on the client — see lib/agents/pipeline.ts client handler.

# ─── Scheduled functions ───────────────────────────────────────────────────
# Every 6 hours: trigger the autonomous pipeline run
[functions."cron-pipeline"]
  schedule = "0 */6 * * *"

# Daily at 09:30 UTC: scan for stale drafts and generate followups
[functions."cron-followups"]
  schedule = "30 9 * * *"

# Daily at 10:00 UTC: scan inbound leads where the AI auto-reply was sent
# 3+ days ago and the buyer hasn't responded. Generates a shorter second
# AI touch + sends via Postmark.
[functions."cron-lead-followups"]
  schedule = "0 10 * * *"

# Every 6 hours (offset by 2h from the pipeline cron so they don't overlap):
# auto-release escrow on delivered transactions that have aged past the
# AUTO_RELEASE_HOURS window (default 168h = 7 days) without a dispute.
[functions."cron-auto-release"]
  schedule = "0 2-23/6 * * *"

# Daily at 09:00 UTC: email the operator a summary of yesterday's activity
# and what needs attention today. Skipped automatically when there's nothing
# to report. Disable via CRON_ENABLED=false.
[functions."cron-daily-digest"]
  schedule = "0 9 * * *"

# Hourly at :15 — sweep for any unpromoted leads scoring at/above
# AUTO_PROMOTE_LEAD_SCORE (default 70). Belt-and-suspenders for the
# synchronous auto-promote path on /api/leads. Bounded scan: last 30 days,
# excludes won/lost/already-promoted leads.
[functions."cron-auto-promote-sweep"]
  schedule = "15 * * * *"

# Every 5 minutes — process the OutreachJob queue. Picks up the next
# pending/running job and drafts up to batchSize (default 25) businesses.
# A 100-business campaign clears in ~20 min; 1000 in ~3.5 hrs. Idle ticks
# return early with {ok, idle:true}.
[functions."cron-outreach-jobs"]
  schedule = "*/5 * * * *"

# Daily at 04:30 UTC — re-run L3 (Operational Verification) for active
# suppliers whose linked transactions changed since the last L3 run.
# Keeps trust scores fresh without operator clicks. Per-tick batch capped
# by SUPPLIER_L3_REFRESH_BATCH (default 50). Skipped when CRON_ENABLED=false
# or kill switch is active.
[functions."cron-supplier-l3-refresh"]
  schedule = "30 4 * * *"

# Every 15 minutes — walk active cadence enrollments and schedule the
# next step's queue item when its dueAt is in the past. Does NOT auto-
# send the email/call/SMS — operator sees the scheduled item on /queue
# and acts on it. Auto-send opt-in lands in slice 4. Skipped on kill
# switch or CRON_ENABLED=false.
[functions."cron-cadences"]
  schedule = "*/15 * * * *"

# Hourly at :05 — scan for cadence touches still pending approval past
# STALE_APPROVAL_HOURS (default 24) and post a digest to
# SLACK_WEBHOOK_URL. No-op when there's nothing stale or Slack isn't
# configured. Useful when the workspace approval mode = first-touch
# or all and the operator falls behind on signoff.
[functions."cron-stale-approvals"]
  schedule = "5 * * * *"

# ─── Headers ───────────────────────────────────────────────────────────────
# Defense-in-depth: deny framing of the operator dashboard, declare strict
# content security on the marketing landing.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# Authenticated admin pages must NEVER be edge-cached. Without this, Netlify's
# CDN was caching /leads HTML for ~50min and serving stale snapshots — newly
# submitted leads wouldn't appear in the inbox until the cache aged out.
# Listed paths mirror lib/nav.ts admin routes.
[[headers]]
  for = "/leads"
  [headers.values]
    Cache-Control = "private, no-store, no-cache, must-revalidate, max-age=0"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "private, no-store, no-cache, must-revalidate, max-age=0"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/transactions"
  [headers.values]
    Cache-Control = "private, no-store, no-cache, must-revalidate, max-age=0"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/approvals"
  [headers.values]
    Cache-Control = "private, no-store, no-cache, must-revalidate, max-age=0"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/outreach"
  [headers.values]
    Cache-Control = "private, no-store, no-cache, must-revalidate, max-age=0"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/pipeline"
  [headers.values]
    Cache-Control = "private, no-store, no-cache, must-revalidate, max-age=0"
    Netlify-CDN-Cache-Control = "no-store"

# Public share + quote viewers can be embedded (e.g., in pitch decks)
[[headers]]
  for = "/share/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/quote/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
